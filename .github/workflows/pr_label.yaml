name: PR / Label

on:
  pull_request_target: {}

jobs:
  triage:
    name: Triage
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-slim
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Apply commit message labels
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const prefixToLabelMap = {
              'chore 🧹': 'chore:',
              'feature 🎉': 'feat:',
              'fix 🐛': 'fix:',
              'refactor 🔧': 'refactor:'
            }

            const labels = []
            for (const [label, prefix] of Object.entries(prefixToLabelMap)) {
              if (context.payload.pull_request.title.startsWith(prefix)) {
                labels.push(label)
              }
            }

            if (labels.length > 0) {
              github.rest.issues.addLabels({
                issue_number: context.issue.number,
                labels,
                owner: context.repo.owner,
                repo: context.repo.repo,
              })
            }
